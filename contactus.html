<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wehman’s Jewelry VT | Custom Jewelry in Burlington</title>
  <section id="contact-form-section" class="contact-section">
    <div class="container">
        <h2>Talk To Us</h2>
        <p>For all questions and inquiries regarding jewelry or to talk to us about jewelry repairs, please fill out the form below.</p>
        
        <form action="#" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>

            <div class="form-group">
                <label for="service">Service Requested</label>
                <select id="service" name="service">
                    <option value="custom">Custom Design Consultation</option>
                    <option value="repair">Jewelry Repair/Cleaning</option>
                    <option value="appraisal">Professional Appraisal</option>
                    <option value="other">General Inquiry</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your piece..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </div>
</section>
