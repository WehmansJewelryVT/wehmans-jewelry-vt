<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --gold: #b89552;
            --slate: #2d2d2d;
            --cream: #fafafa;
            --border: #e0d8cf;
        }

        body {
            font-family: 'Garamond', serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .captcha-container {
            background: white;
            padding: 30px;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
        }

        .brand-mark {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--slate);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .verification-text {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* The Custom CAPTCHA Box */
        .captcha-box {
            background: var(--cream);
            border: 1px solid var(--border);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Custom Checkbox Styling */
        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--gold);
        }

        .captcha-label {
            font-family: sans-serif;
            font-size: 0.95rem;
            color: var(--slate);
        }

        .giving-logo {
            text-align: right;
        }

        .impact-icon {
            font-size: 1.2rem;
            color: var(--gold);
            display: block;
        }

        .impact-tag {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        .btn-continue {
            width: 100%;
            background: var(--slate);
            color: white;
            border: none;
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-continue:hover {
            background: var(--gold);
        }

        .secure-note {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #bbb;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="brand-mark">Wehman's Jewelry LLC</div>
    <p class="verification-text">
        To ensure a secure shopping experience and to protect our community, please confirm you are human.
    </p>

    <div class="captcha-box">
        <div class="checkbox-wrapper">
            <input type="checkbox" id="human">
            <label for="human" class="captcha-label">I am not a robot</label>
        </div>
        <div class="giving-logo">
            <span class="impact-icon">✧</span>
            <span class="impact-tag">15% Giver</span>
        </div>
    </div>

    <button class="btn-continue">Continue to Boutique</button>

    <div class="secure-note">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Secure Verification by Wehman's
    </div>
</div>

</body>
</html>
